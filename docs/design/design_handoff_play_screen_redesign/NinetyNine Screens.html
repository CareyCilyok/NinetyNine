<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NinetyNine — Screen Mockups</title>
  <link rel="stylesheet" href="mockups/theme.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Design system -->
  <script type="text/babel" src="mockups/design-canvas.jsx"></script>
  <script type="text/babel" src="mockups/Shell.jsx"></script>
  <script type="text/babel" src="mockups/FrameCellV2.jsx"></script>
  <script type="text/babel" src="mockups/Screens.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Frame dimensions: 1280×832 gives a "desktop app" feel at a readable
    // scale on the canvas. Matches typical laptop viewport ratio.
    const W = 1280, H = 832;

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="core-loop"
            title="Core loop — score a game"
            subtitle="Landing → new game → live scoring → done"
          >
            <DCArtboard id="home"     label="1. Home · Dashboard"           width={W} height={H}><HomeScreen /></DCArtboard>
            <DCArtboard id="new"      label="2. New Game"                    width={W} height={H}><NewGameScreen /></DCArtboard>
            <DCArtboard id="play"     label="3. Play · Mid-game"             width={W} height={H}><PlayScreen /></DCArtboard>
            <DCArtboard id="play-v2"  label="3b. Play v2 · Paper-faithful (Break ☐ + Ball picker)"  width={W} height={H}><PlayScreenV2 /></DCArtboard>
            <DCArtboard id="play-v2-picker"  label="3c. Play v2 · Ball picker open (wireframe state)"  width={W} height={H}><PlayScreenV2 initialOpenFrame={5} seedActiveBalls={[1, 3, 6]} /></DCArtboard>
            <DCArtboard id="play-v2-multi"   label="3d. Play v2 · Multi-player (active + up next)"  width={W} height={1280}><PlayScreenV2Multi /></DCArtboard>
            <DCArtboard id="complete" label="4. Complete · Perfect 99"        width={W} height={H}><CompleteScreen /></DCArtboard>
          </DCSection>

          <DCSection
            id="review"
            title="Review & stats"
            subtitle="Looking back at completed games"
          >
            <DCArtboard id="history"    label="History · All games"      width={W} height={H}><HistoryScreen /></DCArtboard>
            <DCArtboard id="my-stats"   label="My Stats"                 width={W} height={H}><MyStatsScreen /></DCArtboard>
            <DCArtboard id="leaderboard" label="Leaderboard · Friends"   width={W} height={H}><LeaderboardScreen /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
